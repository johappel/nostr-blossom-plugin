name: Deploy Examples to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build widget bundle
        run: pnpm build:widget

      - name: Prepare static site
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .site
          mkdir -p .site/examples
          mkdir -p .site/packages/blossom-plugin/dist/widget

          cp -R examples/. .site/examples/
          cp -R packages/blossom-plugin/dist/widget/. .site/packages/blossom-plugin/dist/widget/

          cat > .site/index.html <<'HTML'
          <!doctype html>
          <html lang="de">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Redirecting…</title>
              <meta http-equiv="refresh" content="0; url=./examples/simple-input.html" />
              <script>location.replace('./examples/simple-input.html');</script>
            </head>
            <body>
              <a href="./examples/simple-input.html">Weiter zu simple-input.html</a>
            </body>
          </html>
          HTML

          touch .site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./.site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
