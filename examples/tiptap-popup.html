<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blossom TipTap Popup Editor</title>
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
  />
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg: #0f172a;
      --surface: #111827;
      --surface-2: #1f2937;
      --border: #374151;
      --text: #e5e7eb;
      --text-muted: #9ca3af;
      --accent: #22c55e;
      --accent-2: #2563eb;
      --danger: #f87171;
      --radius: 12px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 1rem;
      background:
        radial-gradient(1200px 600px at 5% -15%, #1e293b 0%, transparent 70%),
        radial-gradient(900px 700px at 100% 0%, #111827 0%, transparent 75%),
        var(--bg);
      color: var(--text);
      font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .app {
      width: min(1240px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 0.75rem;
    }

    .panel {
      background: linear-gradient(180deg, rgba(31, 41, 55, 0.92), rgba(15, 23, 42, 0.92));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      -webkit-backdrop-filter: blur(6px);
      backdrop-filter: blur(6px);
    }

    .header {
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .headline {
      display: grid;
      gap: 0.2rem;
    }

    h1 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.02em;
    }

    .subline {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.82rem;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .toolbar {
      padding: 0.75rem;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 0.45rem;
      flex-wrap: wrap;
      align-items: center;
    }

    button,
    select,
    .checkbox {
      border: 1px solid var(--border);
      background: #0b1220;
      color: var(--text);
      border-radius: 9px;
      font: inherit;
      font-size: 0.84rem;
      padding: 0.42rem 0.7rem;
      line-height: 1.1;
    }

    button {
      cursor: pointer;
      transition: transform 0.1s ease, background-color 0.1s ease;
    }

    select {
      cursor: pointer;
      min-width: 8.5rem;
    }

    .toolbar .icon-btn {
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      line-height: 0;
    }

    .toolbar .material-symbols-outlined {
      font-size: 18px;
      line-height: 1;
      font-variation-settings:
        'FILL' 0,
        'wght' 400,
        'GRAD' 0,
        'opsz' 20;
      user-select: none;
      -webkit-user-select: none;
      pointer-events: none;
    }

    .toolbar-sep {
      width: 1px;
      height: 22px;
      background: #374151;
      margin: 0 0.1rem;
    }

    .table-menu-wrap,
    .search-menu-wrap,
    .replace-menu-wrap {
      position: relative;
    }

    .toolbar-popover {
      position: absolute;
      top: calc(100% + 0.35rem);
      right: 0;
      z-index: 5;
      min-width: 170px;
      background: #0b1220;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 0.35rem;
      display: grid;
      gap: 0.25rem;
      box-shadow: 0 8px 24px rgba(2, 6, 23, 0.55);
    }

    .toolbar-popover[hidden] {
      display: none;
    }

    .toolbar-popover .menu-item {
      width: 100%;
      text-align: left;
      justify-content: flex-start;
      font-size: 0.8rem;
      padding: 0.45rem 0.6rem;
    }

    .search-popover {
      min-width: 260px;
    }

    .replace-popover {
      min-width: 300px;
    }

    .popover-form {
      display: grid;
      gap: 0.5rem;
    }

    .popover-row {
      display: grid;
      gap: 0.25rem;
    }

    .popover-row label {
      font-size: 0.72rem;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .popover-row input[type="text"] {
      width: 100%;
      font: inherit;
      font-size: 0.8rem;
      color: #e5e7eb;
      background: #02070f;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 0.42rem 0.5rem;
    }

    .popover-check {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.79rem;
      color: #cbd5e1;
    }

    .popover-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.4rem;
      padding-top: 0.2rem;
    }

    button:hover {
      background: #172136;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary {
      background: #1d4ed8;
      border-color: #1d4ed8;
      color: #fff;
    }

    .btn-primary:hover { background: #1e40af; }

    .btn-accent {
      background: #166534;
      border-color: #166534;
      color: #fff;
    }

    .btn-accent:hover { background: #14532d; }

    .editor-wrap {
      min-height: 320px;
      max-height: 55vh;
      overflow: auto;
      padding: 1rem;
    }

    .ProseMirror {
      min-height: 280px;
      outline: none;
      line-height: 1.55;
      font-size: 1rem;
    }

    .ProseMirror p { margin: 0.45rem 0; }
    .ProseMirror h1,
    .ProseMirror h2,
    .ProseMirror h3 { margin: 0.8rem 0 0.35rem; }
    .ProseMirror ul,
    .ProseMirror ol { padding-left: 1.4rem; }
    .ProseMirror blockquote {
      border-left: 3px solid #4b5563;
      padding-left: 0.8rem;
      margin: 0.75rem 0;
      color: #cbd5e1;
    }
    .ProseMirror pre {
      background: #030712;
      border: 1px solid #1f2937;
      border-radius: 10px;
      padding: 0.7rem 0.9rem;
      overflow-x: auto;
      color: #d1fae5;
    }
    .ProseMirror img {
      max-width: 100%;
      border-radius: 10px;
      display: block;
      margin: 0.6rem 0;
    }
    .ProseMirror .tiptap-image-resizer {
      position: relative;
      display: inline-block;
      max-width: 100%;
      margin: 0.6rem 0;
      line-height: 0;
      border-radius: 10px;
    }
    .ProseMirror .tiptap-image-resizer img {
      margin: 0;
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      display: block;
    }
    .ProseMirror .tiptap-image-resizer::after {
      content: '';
      position: absolute;
      inset: 0;
      border: 1px solid transparent;
      border-radius: 10px;
      pointer-events: none;
      transition: border-color 0.12s ease;
    }
    .ProseMirror .tiptap-image-resizer:hover::after,
    .ProseMirror .tiptap-image-resizer.is-resizing::after {
      border-color: #60a5fa;
    }
    .ProseMirror .tiptap-image-resizer .resize-handle {
      all: unset;
      position: absolute;
      right: -8px;
      bottom: -8px;
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.85);
      background: #1d4ed8;
      cursor: nwse-resize;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.5);
      opacity: 0;
      transition: opacity 0.12s ease, transform 0.12s ease;
    }
    .ProseMirror .tiptap-image-resizer:hover .resize-handle,
    .ProseMirror .tiptap-image-resizer.is-resizing .resize-handle {
      opacity: 1;
      transform: scale(1.04);
    }
    .ProseMirror p.is-editor-empty:first-child::before {
      content: attr(data-placeholder);
      color: #6b7280;
      float: left;
      height: 0;
      pointer-events: none;
    }
    .ProseMirror table {
      border-collapse: collapse;
      table-layout: fixed;
      width: 100%;
      margin: 0.8rem 0;
      overflow: hidden;
      border-radius: 8px;
    }
    .ProseMirror th,
    .ProseMirror td {
      border: 1px solid #334155;
      padding: 0.45rem 0.55rem;
      vertical-align: top;
      position: relative;
    }
    .ProseMirror th {
      background: #0a1222;
      color: #bfdbfe;
      font-weight: 700;
    }
    .ProseMirror .selectedCell::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(59, 130, 246, 0.17);
      pointer-events: none;
    }
    .ProseMirror .column-resize-handle {
      position: absolute;
      right: -2px;
      top: 0;
      bottom: 0;
      width: 4px;
      background: #60a5fa;
      pointer-events: none;
    }

    .meta {
      display: grid;
      gap: 0.75rem;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      padding: 0.75rem;
    }

    .box {
      background: #060d1a;
      border: 1px solid #1f2937;
      border-radius: 10px;
      padding: 0.65rem;
      display: grid;
      gap: 0.35rem;
      min-height: 220px;
    }

    .box-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      font-size: 0.77rem;
      letter-spacing: 0.02em;
    }

    textarea.output {
      width: 100%;
      min-height: 178px;
      resize: vertical;
      border: 1px solid #243244;
      background: #02070f;
      color: #d1d5db;
      border-radius: 8px;
      font: 0.8rem/1.4 var(--mono);
      padding: 0.55rem 0.6rem;
    }

    .status {
      padding: 0.62rem 0.85rem;
      margin: 0 0.75rem 0.75rem;
      border-radius: 10px;
      border: 1px solid #1f2937;
      background: #0a1222;
      color: #9ca3af;
      font-size: 0.82rem;
      min-height: 2.35rem;
      display: flex;
      align-items: center;
    }

    .status.ok {
      border-color: #166534;
      color: #86efac;
      background: #052e16;
    }

    .status.err {
      border-color: #7f1d1d;
      color: #fca5a5;
      background: #3f0e12;
    }

    .checkbox {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.35rem 0.6rem;
      -webkit-user-select: none;
      user-select: none;
      background: #0a1222;
    }

    .checkbox input {
      margin: 0;
      accent-color: var(--accent);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 900px) {
      body { padding: 0.5rem; }
      .meta { grid-template-columns: 1fr; }
      .toolbar { padding: 0.55rem; }
      .header { align-items: flex-start; flex-direction: column; }
      .header-actions { width: 100%; justify-content: flex-start; }
      .editor-wrap { max-height: none; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <header class="header">
        <div class="headline">
          <h1>TipTap Popup Editor + Blossom Mediahook</h1>
          <p class="subline">Serverless Browser-Flow: Markdown rein, HTML im Editor, Markdown + HTML raus.</p>
        </div>
        <div class="header-actions">
          <label class="checkbox" title="Kopiert den gesamten Markdown-Inhalt direkt nach dem Media-Einfuegen.">
            <input id="autocopy" type="checkbox" checked />
            Auto-copy after media insert
          </label>
          <button id="open-media" class="btn-accent" type="button">Mediahook</button>
          <button id="copy-all" class="btn-primary" type="button">Kopieren</button>
        </div>
      </header>

      <nav class="toolbar" aria-label="Editor Toolbar">
        <label class="sr-only" for="heading-level">Heading Level</label>
        <select id="heading-level" title="Heading Level" aria-label="Heading Level">
          <option value="0">Paragraph</option>
          <option value="1">Heading 1</option>
          <option value="2">Heading 2</option>
          <option value="3">Heading 3</option>
          <option value="4">Heading 4</option>
          <option value="5">Heading 5</option>
        </select>
        <button type="button" data-cmd="bold"><strong>B</strong></button>
        <button type="button" data-cmd="italic"><em>I</em></button>
        <button type="button" data-cmd="underline"><u>U</u></button>
        <span class="toolbar-sep" aria-hidden="true"></span>
        <button type="button" data-cmd="bullet" class="icon-btn" title="Bulleted List" aria-label="Bulleted List">
          <span class="material-symbols-outlined" aria-hidden="true">format_list_bulleted</span>
        </button>
        <button type="button" data-cmd="ordered" class="icon-btn" title="Numbered List" aria-label="Numbered List">
          <span class="material-symbols-outlined" aria-hidden="true">format_list_numbered</span>
        </button>
        <button type="button" data-cmd="quote" class="icon-btn" title="Quote" aria-label="Quote">
          <span class="material-symbols-outlined" aria-hidden="true">format_quote</span>
        </button>
        <button type="button" data-cmd="code">Code</button>
        <button type="button" data-cmd="link">Link</button>
        <span class="toolbar-sep" aria-hidden="true"></span>
        <button type="button" data-cmd="insert-table" class="icon-btn" title="Tabelle einfügen" aria-label="Tabelle einfügen">
          <span class="material-symbols-outlined" aria-hidden="true">table</span>
        </button>
        <div class="table-menu-wrap">
          <button
            id="table-menu-toggle"
            type="button"
            class="icon-btn"
            title="Tabelle bearbeiten"
            aria-label="Tabelle bearbeiten"
            aria-expanded="false"
            aria-controls="table-menu"
          >
            <span class="material-symbols-outlined" aria-hidden="true">table_edit</span>
          </button>
          <div id="table-menu" class="toolbar-popover" hidden>
            <button type="button" class="menu-item" data-cmd="add-row-after">+ Zeile</button>
            <button type="button" class="menu-item" data-cmd="add-column-after">+ Spalte</button>
            <button type="button" class="menu-item" data-cmd="delete-row">- Zeile</button>
            <button type="button" class="menu-item" data-cmd="delete-column">- Spalte</button>
            <button type="button" class="menu-item" data-cmd="delete-table">Tabelle löschen</button>
          </div>
        </div>
        <span class="toolbar-sep" aria-hidden="true"></span>
        <div class="search-menu-wrap">
          <button
            id="search-popover-toggle"
            type="button"
            data-cmd="search"
            class="icon-btn"
            title="Suchen"
            aria-label="Suchen"
            aria-expanded="false"
            aria-controls="search-popover"
          >
            <span class="material-symbols-outlined" aria-hidden="true">search</span>
          </button>
          <div id="search-popover" class="toolbar-popover search-popover" hidden>
            <form id="search-popover-form" class="popover-form">
              <div class="popover-row">
                <label for="search-input">Suchbegriff</label>
                <input id="search-input" name="search" type="text" autocomplete="off" />
              </div>
              <div class="popover-actions">
                <button id="search-run-btn" type="submit" class="btn-primary">Suchen</button>
                <button id="search-close-btn" type="button">Schließen</button>
              </div>
            </form>
          </div>
        </div>
        <div class="replace-menu-wrap">
          <button
            id="replace-popover-toggle"
            type="button"
            data-cmd="replace"
            class="icon-btn"
            title="Suchen & Ersetzen"
            aria-label="Suchen & Ersetzen"
            aria-expanded="false"
            aria-controls="replace-popover"
          >
            <span class="material-symbols-outlined" aria-hidden="true">find_replace</span>
          </button>
          <div id="replace-popover" class="toolbar-popover replace-popover" hidden>
            <form id="replace-popover-form" class="popover-form">
              <div class="popover-row">
                <label for="replace-search-input">Suchen nach</label>
                <input id="replace-search-input" name="search" type="text" autocomplete="off" />
              </div>
              <div class="popover-row">
                <label for="replace-value-input">Ersetzen durch</label>
                <input id="replace-value-input" name="replace" type="text" autocomplete="off" />
              </div>
              <label class="popover-check">
                <input id="replace-all-checkbox" name="replace-all" type="checkbox" />
                Alle Treffer ersetzen
              </label>
              <div class="popover-actions">
                <button id="replace-run-btn" type="submit" class="btn-primary">Ersetzen</button>
                <button id="replace-close-btn" type="button">Schließen</button>
              </div>
            </form>
          </div>
        </div>
        <span class="toolbar-sep" aria-hidden="true"></span>
        <button type="button" data-cmd="undo" class="icon-btn" title="Undo" aria-label="Undo">
          <span class="material-symbols-outlined" aria-hidden="true">undo</span>
        </button>
        <button type="button" data-cmd="redo" class="icon-btn" title="Redo" aria-label="Redo">
          <span class="material-symbols-outlined" aria-hidden="true">redo</span>
        </button>
      </nav>

      <div id="editor" class="editor-wrap"></div>

      <div class="meta">
        <article class="box">
          <div class="box-header">
            <strong>Markdown Output</strong>
            <span id="md-length">0 chars</span>
          </div>
          <label class="sr-only" for="markdown-output">Markdown Output</label>
          <textarea
            id="markdown-output"
            class="output"
            title="Markdown Output"
            aria-label="Markdown Output"
            readonly
          ></textarea>
        </article>
        <article class="box">
          <div class="box-header">
            <strong>HTML Output</strong>
            <span id="html-length">0 chars</span>
          </div>
          <label class="sr-only" for="html-output">HTML Output</label>
          <textarea
            id="html-output"
            class="output"
            title="HTML Output"
            aria-label="HTML Output"
            readonly
          ></textarea>
        </article>
      </div>

      <div id="status" class="status">Editor wird geladen...</div>
    </section>
  </main>

  <script src="../packages/blossom-plugin/dist/widget/blossom-media.iife.js"></script>
  <script type="module">
    // @ts-nocheck
    // Example-only: suppress VSCode JS type errors for CDN imports and IIFE globals.
    // Important: no `?bundle` here. Bundling each extension separately creates
    // duplicate ProseMirror instances and triggers:
    // "Adding different instances of a keyed plugin (plugin$)".
    import { Editor } from 'https://esm.sh/@tiptap/core@2.11.5';
    import StarterKit from 'https://esm.sh/@tiptap/starter-kit@2.11.5';
    import Underline from 'https://esm.sh/@tiptap/extension-underline@2.11.5';
    import Link from 'https://esm.sh/@tiptap/extension-link@2.11.5';
    import Image from 'https://esm.sh/@tiptap/extension-image@2.11.5';
    import Placeholder from 'https://esm.sh/@tiptap/extension-placeholder@2.11.5';
    import Table from 'https://esm.sh/@tiptap/extension-table@2.11.5';
    import TableRow from 'https://esm.sh/@tiptap/extension-table-row@2.11.5';
    import TableHeader from 'https://esm.sh/@tiptap/extension-table-header@2.11.5';
    import TableCell from 'https://esm.sh/@tiptap/extension-table-cell@2.11.5';
    import { marked } from 'https://esm.sh/marked@13.0.3?bundle';
    import TurndownService from 'https://esm.sh/turndown@7.2.0?bundle';
    import * as TurndownPluginGfm from 'https://esm.sh/turndown-plugin-gfm@1.0.2';

    const statusEl = document.getElementById('status');
    const markdownOutputEl = document.getElementById('markdown-output');
    const htmlOutputEl = document.getElementById('html-output');
    const mdLengthEl = document.getElementById('md-length');
    const htmlLengthEl = document.getElementById('html-length');
    const openMediaButton = document.getElementById('open-media');
    const copyAllButton = document.getElementById('copy-all');
    const autoCopyCheckbox = document.getElementById('autocopy');
    const headingSelect = document.getElementById('heading-level');
    const tableMenuToggle = document.getElementById('table-menu-toggle');
    const tableMenu = document.getElementById('table-menu');
    const searchPopoverToggle = document.getElementById('search-popover-toggle');
    const searchPopover = document.getElementById('search-popover');
    const searchPopoverForm = document.getElementById('search-popover-form');
    const searchInput = document.getElementById('search-input');
    const searchCloseButton = document.getElementById('search-close-btn');
    const replacePopoverToggle = document.getElementById('replace-popover-toggle');
    const replacePopover = document.getElementById('replace-popover');
    const replacePopoverForm = document.getElementById('replace-popover-form');
    const replaceSearchInput = document.getElementById('replace-search-input');
    const replaceValueInput = document.getElementById('replace-value-input');
    const replaceAllCheckbox = document.getElementById('replace-all-checkbox');
    const replaceCloseButton = document.getElementById('replace-close-btn');

    const params = new URLSearchParams(window.location.search);
    const servers = parseCsv(params.get('servers')) || ['https://blossom.primal.net', 'https://cdn.satellite.earth'];
    const relayUrl = params.get('relay') || 'wss://relay.damus.io';
    const visionEndpoint = params.get('vision') || '';
    const MIN_IMAGE_WIDTH = 96;

    const turndown = new TurndownService({
      headingStyle: 'atx',
      bulletListMarker: '-',
      codeBlockStyle: 'fenced',
      emDelimiter: '_',
    });
    const gfmPlugin =
      TurndownPluginGfm.gfm ||
      TurndownPluginGfm.default?.gfm ||
      TurndownPluginGfm.default ||
      null;
    if (gfmPlugin) {
      turndown.use(gfmPlugin);
    }
    turndown.addRule('resizedImages', {
      filter(node) {
        return node.nodeName === 'IMG';
      },
      replacement(content, node) {
        const src = (node.getAttribute('src') || '').trim();
        if (!src) return '';

        const alt = node.getAttribute('alt') || '';
        const title = (node.getAttribute('title') || '').trim();
        const width = parseNumericSize(node.getAttribute('width') || node.style.width || '');

        if (width) {
          return `<img src="${escapeHtmlAttr(src)}" alt="${escapeHtmlAttr(alt)}" width="${width}" />`;
        }

        const safeAlt = alt.replace(/\]/g, '\\]');
        const safeTitle = title ? ` "${title.replace(/"/g, '\\"')}"` : '';
        return `![${safeAlt}](${src}${safeTitle})`;
      },
    });
    turndown.addRule('tablesToMarkdown', {
      filter(node) {
        return node.nodeName === 'TABLE';
      },
      replacement(content, node) {
        const table = node;
        const rowNodes = Array.from(table.querySelectorAll('tr'));
        if (rowNodes.length === 0) return '\n\n';

        const rows = rowNodes.map((row) => {
          const cells = Array.from(row.children).filter((child) => {
            return child.nodeName === 'TH' || child.nodeName === 'TD';
          });
          return cells.map((cell) => normalizeTableCell(cell.textContent || ''));
        });

        const colCount = rows.reduce((max, row) => Math.max(max, row.length), 0);
        if (colCount === 0) return '\n\n';

        const padded = rows.map((row) => {
          const clone = row.slice();
          while (clone.length < colCount) clone.push('');
          return clone;
        });

        const header = padded[0];
        const separator = new Array(colCount).fill('---');
        const body = padded.slice(1);

        const lines = [
          `| ${header.join(' | ')} |`,
          `| ${separator.join(' | ')} |`,
          ...body.map((row) => `| ${row.join(' | ')} |`),
        ];

        return `\n\n${lines.join('\n')}\n\n`;
      },
    });

    let editor;
    let mediaApi = null;
    let lastSearchQuery = '';
    let lastSearchIndex = 0;

    function setStatus(message, type = 'info') {
      statusEl.textContent = message;
      statusEl.classList.remove('ok', 'err');
      if (type === 'ok') statusEl.classList.add('ok');
      if (type === 'err') statusEl.classList.add('err');
    }

    function parseCsv(value) {
      if (!value) return null;
      const parts = value.split(',').map((item) => item.trim()).filter(Boolean);
      return parts.length > 0 ? parts : null;
    }

    function parseNumericSize(value) {
      const parsed = Number.parseInt(String(value || '').replace(/[^\d]/g, ''), 10);
      if (!Number.isFinite(parsed) || parsed <= 0) return null;
      return parsed;
    }

    function normalizeTableCell(value) {
      return String(value || '')
        .replace(/\n+/g, ' ')
        .replace(/\s+/g, ' ')
        .replace(/\|/g, '\\|')
        .trim();
    }

    function looksLikeMarkdown(text) {
      if (!text) return false;
      if (text.length > 12000) return false;
      const hasSignal = /(^#{1,6}\s)|(\*\*[^*]+\*\*)|(\[[^\]]+\]\([^)]+\))|(^\s*[-*+]\s)|(^\s*\d+\.\s)|(```)|(^>\s)/m;
      return hasSignal.test(text);
    }

    function markdownToHtml(markdown) {
      const rendered = marked.parse(markdown, {
        gfm: true,
        breaks: true,
      });
      return typeof rendered === 'string' ? rendered : '';
    }

    function updateOutputs() {
      const html = editor.getHTML();
      const markdown = turndown.turndown(html).trim();

      htmlOutputEl.value = html;
      markdownOutputEl.value = markdown;
      htmlLengthEl.textContent = `${html.length} chars`;
      mdLengthEl.textContent = `${markdown.length} chars`;
    }

    function escapeHtml(value) {
      return value
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeHtmlAttr(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function createResizableImageExtension(baseImage) {
      return baseImage.extend({
        addAttributes() {
          return {
            ...this.parent?.(),
            width: {
              default: null,
              parseHTML: (element) => {
                return parseNumericSize(
                  element.getAttribute('width') || element.style.width || '',
                );
              },
              renderHTML: (attributes) => {
                if (!attributes.width) return {};
                return { width: String(attributes.width) };
              },
            },
          };
        },
        addNodeView() {
          return ({ node, editor, getPos }) => {
            let currentNode = node;
            let resizing = false;
            let startX = 0;
            let startWidth = 0;

            const dom = document.createElement('span');
            dom.className = 'tiptap-image-resizer';

            const img = document.createElement('img');
            img.draggable = false;
            dom.appendChild(img);

            const handle = document.createElement('button');
            handle.type = 'button';
            handle.className = 'resize-handle';
            handle.tabIndex = -1;
            handle.setAttribute('aria-label', 'Bildbreite anpassen');
            handle.setAttribute('title', 'Bildbreite anpassen');
            dom.appendChild(handle);

            const applyAttrs = (attrs) => {
              img.src = attrs.src || '';
              img.alt = attrs.alt || '';
              if (attrs.title) {
                img.title = attrs.title;
              } else {
                img.removeAttribute('title');
              }

              const parsedWidth = parseNumericSize(attrs.width);
              if (parsedWidth) {
                img.style.width = `${parsedWidth}px`;
                img.setAttribute('width', String(parsedWidth));
              } else {
                img.style.removeProperty('width');
                img.removeAttribute('width');
              }
            };

            const commitWidth = (nextWidth) => {
              const pos = typeof getPos === 'function' ? getPos() : null;
              if (typeof pos !== 'number') return;

              const normalizedWidth = Math.max(MIN_IMAGE_WIDTH, Math.round(nextWidth));
              if (currentNode.attrs.width === normalizedWidth) return;

              const currentAtPos = editor.state.doc.nodeAt(pos);
              if (!currentAtPos) return;

              const tr = editor.state.tr.setNodeMarkup(pos, undefined, {
                ...currentAtPos.attrs,
                width: normalizedWidth,
              });
              editor.view.dispatch(tr);
            };

            const onPointerMove = (event) => {
              if (!resizing) return;
              const deltaX = event.clientX - startX;
              const nextWidth = Math.max(MIN_IMAGE_WIDTH, Math.round(startWidth + deltaX));
              img.style.width = `${nextWidth}px`;
              img.setAttribute('width', String(nextWidth));
            };

            const stopResize = () => {
              if (!resizing) return;
              resizing = false;
              dom.classList.remove('is-resizing');
              window.removeEventListener('pointermove', onPointerMove);
              window.removeEventListener('pointerup', stopResize);
              window.removeEventListener('pointercancel', stopResize);
              const finalWidth = Math.round(img.getBoundingClientRect().width);
              commitWidth(finalWidth);
            };

            handle.addEventListener('pointerdown', (event) => {
              event.preventDefault();
              event.stopPropagation();
              resizing = true;
              dom.classList.add('is-resizing');
              startX = event.clientX;
              startWidth = img.getBoundingClientRect().width || MIN_IMAGE_WIDTH;
              window.addEventListener('pointermove', onPointerMove);
              window.addEventListener('pointerup', stopResize);
              window.addEventListener('pointercancel', stopResize);
            });

            applyAttrs(currentNode.attrs);

            return {
              dom,
              update(updatedNode) {
                if (updatedNode.type !== currentNode.type) return false;
                currentNode = updatedNode;
                applyAttrs(currentNode.attrs);
                return true;
              },
              destroy() {
                window.removeEventListener('pointermove', onPointerMove);
                window.removeEventListener('pointerup', stopResize);
                window.removeEventListener('pointercancel', stopResize);
              },
            };
          };
        },
      });
    }

    function inferLabelFromUrl(url) {
      try {
        const parsed = new URL(url);
        return parsed.pathname.split('/').filter(Boolean).pop() || url;
      } catch {
        return url;
      }
    }

    function insertBlossomResult(result) {
      if (!result || !result.url) return;

      if (result.mimeType && result.mimeType.startsWith('image/')) {
        editor
          .chain()
          .focus()
          .setImage({
            src: result.url,
            alt: result.alt || result.description || 'Blossom media',
          })
          .run();
      } else {
        const linkLabel = result.description || result.alt || inferLabelFromUrl(result.url);
        const safeHref = escapeHtml(result.url);
        const safeLabel = escapeHtml(linkLabel);
        editor
          .chain()
          .focus()
          .insertContent(`<p><a href="${safeHref}" target="_blank" rel="noopener noreferrer">${safeLabel}</a></p>`)
          .run();
      }
    }

    async function copyTextToClipboard(text) {
      if (!text) return false;

      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        return true;
      }

      const temp = document.createElement('textarea');
      temp.value = text;
      temp.style.position = 'fixed';
      temp.style.left = '-9999px';
      document.body.appendChild(temp);
      temp.select();
      const success = document.execCommand('copy');
      temp.remove();
      return success;
    }

    async function copyAllMarkdown() {
      const markdown = markdownOutputEl.value || '';
      if (!markdown.trim()) {
        setStatus('Kein Inhalt zum Kopieren vorhanden.', 'err');
        return;
      }

      try {
        await copyTextToClipboard(markdown);
        setStatus('Markdown wurde in die Zwischenablage kopiert.', 'ok');
      } catch (error) {
        console.error(error);
        setStatus('Kopieren fehlgeschlagen. Bitte manuell kopieren.', 'err');
      }
    }

    function runToolbarCommand(command) {
      switch (command) {
        case 'bold':
          editor.chain().focus().toggleBold().run();
          break;
        case 'italic':
          editor.chain().focus().toggleItalic().run();
          break;
        case 'underline':
          editor.chain().focus().toggleUnderline().run();
          break;
        case 'bullet':
          editor.chain().focus().toggleBulletList().run();
          break;
        case 'ordered':
          editor.chain().focus().toggleOrderedList().run();
          break;
        case 'quote':
          editor.chain().focus().toggleBlockquote().run();
          break;
        case 'code':
          editor.chain().focus().toggleCodeBlock().run();
          break;
        case 'undo':
          editor.chain().focus().undo().run();
          break;
        case 'redo':
          editor.chain().focus().redo().run();
          break;
        case 'link': {
          const previous = editor.getAttributes('link').href || '';
          const url = window.prompt('Link URL', previous);
          if (url === null) return;
          const cleaned = url.trim();
          if (!cleaned) {
            editor.chain().focus().unsetLink().run();
            return;
          }
          editor.chain().focus().extendMarkRange('link').setLink({ href: cleaned }).run();
          break;
        }
        case 'insert-table':
          editor.chain().focus().insertTable({ rows: 3, cols: 3, withHeaderRow: true }).run();
          break;
        case 'add-row-after':
          editor.chain().focus().addRowAfter().run();
          break;
        case 'add-column-after':
          editor.chain().focus().addColumnAfter().run();
          break;
        case 'delete-row':
          editor.chain().focus().deleteRow().run();
          break;
        case 'delete-column':
          editor.chain().focus().deleteColumn().run();
          break;
        case 'delete-table':
          editor.chain().focus().deleteTable().run();
          break;
        case 'search':
          runSearchAction();
          break;
        case 'replace':
          runReplaceAction();
          break;
        default:
          break;
      }
    }

    function buildTextSegments() {
      const segments = [];
      let fullText = '';
      editor.state.doc.descendants((node, pos) => {
        if (!node.isText) return;
        const value = node.text || '';
        if (!value) return;
        const start = fullText.length;
        const end = start + value.length;
        segments.push({
          pos,
          value,
          start,
          end,
        });
        fullText += value;
      });
      return { fullText, segments };
    }

    function absoluteIndexToDocPos(segments, index) {
      for (const segment of segments) {
        if (index >= segment.start && index <= segment.end) {
          return segment.pos + (index - segment.start);
        }
      }
      if (segments.length > 0 && index >= segments[segments.length - 1].end) {
        const last = segments[segments.length - 1];
        return last.pos + last.value.length;
      }
      return null;
    }

    function findNextMatch(query, fromIndex = 0, wrap = true) {
      const q = query.trim();
      if (!q) return null;

      const { fullText, segments } = buildTextSegments();
      if (!fullText) return null;

      const haystack = fullText.toLowerCase();
      const needle = q.toLowerCase();

      let index = haystack.indexOf(needle, Math.max(0, fromIndex));
      if (index === -1 && wrap) {
        index = haystack.indexOf(needle, 0);
      }
      if (index === -1) return null;

      const from = absoluteIndexToDocPos(segments, index);
      const to = absoluteIndexToDocPos(segments, index + q.length);
      if (from == null || to == null || to <= from) return null;

      return { index, from, to };
    }

    function selectMatch(match) {
      editor.chain().focus().setTextSelection({ from: match.from, to: match.to }).run();
      lastSearchIndex = match.index + 1;
    }

    function runSearchAction() {
      closeTableMenuIfOpen();
      closeReplacePopoverIfOpen();
      if (!searchPopover.hidden) {
        closeSearchPopoverIfOpen();
      } else {
        openSearchPopover(lastSearchQuery || '');
      }
    }

    function runReplaceAction() {
      closeTableMenuIfOpen();
      closeSearchPopoverIfOpen();
      if (!replacePopover.hidden) {
        closeReplacePopoverIfOpen();
      } else {
        openReplacePopover(lastSearchQuery || '', '');
      }
    }

    function closeTableMenuIfOpen() {
      if (!tableMenu || tableMenu.hidden) return;
      tableMenu.hidden = true;
      tableMenuToggle.setAttribute('aria-expanded', 'false');
    }

    function closeSearchPopoverIfOpen() {
      if (!searchPopover || searchPopover.hidden) return;
      searchPopover.hidden = true;
      searchPopoverToggle.setAttribute('aria-expanded', 'false');
    }

    function openSearchPopover(initialValue = '') {
      if (!searchPopover) return;
      searchInput.value = initialValue;
      searchPopover.hidden = false;
      searchPopoverToggle.setAttribute('aria-expanded', 'true');
      requestAnimationFrame(() => {
        searchInput.focus();
        searchInput.select();
      });
    }

    function closeReplacePopoverIfOpen() {
      if (!replacePopover || replacePopover.hidden) return;
      replacePopover.hidden = true;
      replacePopoverToggle.setAttribute('aria-expanded', 'false');
    }

    function openReplacePopover(initialSearch = '', initialReplace = '') {
      if (!replacePopover) return;
      replaceSearchInput.value = initialSearch;
      replaceValueInput.value = initialReplace;
      replacePopover.hidden = false;
      replacePopoverToggle.setAttribute('aria-expanded', 'true');
      requestAnimationFrame(() => {
        replaceSearchInput.focus();
        replaceSearchInput.select();
      });
    }

    function runSearchFromPopover() {
      const query = searchInput.value.trim();
      if (!query) {
        setStatus('Suche abgebrochen: kein Suchtext.', 'err');
        return;
      }

      const startIndex = query === lastSearchQuery ? lastSearchIndex : 0;
      lastSearchQuery = query;
      const match = findNextMatch(query, startIndex, true);
      if (!match) {
        setStatus(`Kein Treffer für "${query}".`, 'err');
        return;
      }

      selectMatch(match);
      setStatus(`Treffer für "${query}" markiert.`, 'ok');
    }

    function runReplaceFromPopover() {
      const query = replaceSearchInput.value.trim();
      const replacement = replaceValueInput.value;
      const replaceAll = replaceAllCheckbox.checked;

      if (!query) {
        setStatus('Ersetzen abgebrochen: kein Suchtext.', 'err');
        return;
      }

      lastSearchQuery = query;
      lastSearchIndex = 0;

      if (replaceAll) {
        let replaced = 0;
        let cursor = 0;
        for (let i = 0; i < 5000; i += 1) {
          const match = findNextMatch(query, cursor, false);
          if (!match) break;
          editor.chain().focus().insertContentAt({ from: match.from, to: match.to }, replacement).run();
          replaced += 1;
          cursor = match.index + replacement.length;
        }
        if (replaced === 0) {
          setStatus(`Kein Treffer für "${query}".`, 'err');
          return;
        }
        updateOutputs();
        setStatus(`${replaced} Treffer ersetzt.`, 'ok');
        return;
      }

      const match = findNextMatch(query, lastSearchIndex, true);
      if (!match) {
        setStatus(`Kein Treffer für "${query}".`, 'err');
        return;
      }
      editor.chain().focus().insertContentAt({ from: match.from, to: match.to }, replacement).run();
      updateOutputs();
      setStatus('Ein Treffer ersetzt.', 'ok');
    }

    function applyHeadingLevel(rawLevel) {
      const level = Number.parseInt(rawLevel, 10);
      if (!Number.isFinite(level) || level <= 0) {
        editor.chain().focus().setParagraph().run();
        return;
      }
      editor.chain().focus().setHeading({ level }).run();
    }

    function getCurrentHeadingLevel() {
      for (let level = 1; level <= 5; level += 1) {
        if (editor.isActive('heading', { level })) return String(level);
      }
      return '0';
    }

    function syncHeadingDropdown() {
      if (!headingSelect) return;
      headingSelect.value = getCurrentHeadingLevel();
    }

    function initEditor() {
      const ResizableImage = createResizableImageExtension(Image);

      editor = new Editor({
        element: document.getElementById('editor'),
        extensions: [
          StarterKit,
          Underline,
          ResizableImage,
          Table.configure({
            resizable: true,
          }),
          TableRow,
          TableHeader,
          TableCell,
          Link.configure({
            openOnClick: false,
            autolink: true,
            defaultProtocol: 'https',
            protocols: ['http', 'https', 'nostr'],
          }),
          Placeholder.configure({
            placeholder: 'Markdown pasten oder direkt schreiben...',
          }),
        ],
        content: '<p>Serverless TipTap Popup ist bereit. Fuege Markdown ein oder nutze den Mediahook.</p>',
        onCreate: () => {
          updateOutputs();
          syncHeadingDropdown();
        },
        onUpdate: () => {
          updateOutputs();
          syncHeadingDropdown();
        },
        onSelectionUpdate: syncHeadingDropdown,
        editorProps: {
          handlePaste(view, event) {
            const clipboard = event.clipboardData;
            if (!clipboard) return false;

            const plainText = clipboard.getData('text/plain') || '';
            // Many apps provide both text/plain and text/html.
            // If plain text looks like Markdown, prefer Markdown conversion.
            if (!looksLikeMarkdown(plainText)) {
              return false;
            }

            event.preventDefault();
            const renderedHtml = markdownToHtml(plainText);
            editor.chain().focus().insertContent(renderedHtml).run();
            setStatus('Markdown-Paste erkannt und als HTML im Editor gerendert.', 'ok');
            return true;
          },
        },
      });
    }

    function initToolbar() {
      document.querySelectorAll('[data-cmd]').forEach((button) => {
        button.addEventListener('click', () => {
          runToolbarCommand(button.getAttribute('data-cmd'));
        });
      });

      copyAllButton.addEventListener('click', copyAllMarkdown);
      headingSelect.addEventListener('change', (event) => {
        applyHeadingLevel(event.target.value);
        syncHeadingDropdown();
      });

      function closeTableMenu() {
        tableMenu.hidden = true;
        tableMenuToggle.setAttribute('aria-expanded', 'false');
      }

      function openTableMenu() {
        tableMenu.hidden = false;
        tableMenuToggle.setAttribute('aria-expanded', 'true');
      }

      tableMenuToggle.addEventListener('click', (event) => {
        event.stopPropagation();
        closeSearchPopoverIfOpen();
        closeReplacePopoverIfOpen();
        if (tableMenu.hidden) {
          openTableMenu();
        } else {
          closeTableMenu();
        }
      });

      tableMenu.addEventListener('click', () => {
        closeTableMenu();
      });

      searchPopoverForm.addEventListener('submit', (event) => {
        event.preventDefault();
        runSearchFromPopover();
      });
      searchCloseButton.addEventListener('click', () => {
        closeSearchPopoverIfOpen();
      });

      replacePopoverForm.addEventListener('submit', (event) => {
        event.preventDefault();
        runReplaceFromPopover();
      });
      replaceCloseButton.addEventListener('click', () => {
        closeReplacePopoverIfOpen();
      });

      document.addEventListener('click', (event) => {
        const target = event.target;
        if (!(target instanceof Element)) return;

        if (!tableMenu.hidden && !target.closest('.table-menu-wrap')) {
          closeTableMenu();
        }
        if (!searchPopover.hidden && !target.closest('.search-menu-wrap')) {
          closeSearchPopoverIfOpen();
        }
        if (!replacePopover.hidden && !target.closest('.replace-menu-wrap')) {
          closeReplacePopoverIfOpen();
        }
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          closeTableMenu();
          closeSearchPopoverIfOpen();
          closeReplacePopoverIfOpen();
        }
      });
    }

    function initMediahook() {
      if (!window.BlossomMedia || typeof window.BlossomMedia.init !== 'function') {
        openMediaButton.disabled = true;
        setStatus('Blossom widget script nicht gefunden. Bitte erst build:widget ausfuehren.', 'err');
        return;
      }

      mediaApi = window.BlossomMedia.init({
        servers,
        relayUrl,
        targets: '',
        signer: window.nostr,
        ...(visionEndpoint ? { visionEndpoint } : {}),
        onInsert: async (result) => {
          insertBlossomResult(result);
          updateOutputs();
          setStatus(`Media eingefuegt: ${result.url}`, 'ok');
          if (autoCopyCheckbox.checked) {
            await copyAllMarkdown();
          }
        },
        onError: (error) => {
          console.error(error);
          setStatus(`Mediahook Fehler: ${error.message}`, 'err');
        },
      });

      openMediaButton.addEventListener('click', () => {
        mediaApi.open(undefined, 'gallery');
      });
    }

    function boot() {
      initEditor();
      initToolbar();
      initMediahook();
      setStatus('Editor bereit. H1-H5 im Dropdown, Tabellen in der Toolbar, Bild-Resizer unten rechts.', 'ok');
    }

    boot();

    window.addEventListener('beforeunload', () => {
      try {
        mediaApi?.destroy?.();
      } catch (error) {
        console.error(error);
      }
      editor?.destroy?.();
    });
  </script>
</body>
</html>
