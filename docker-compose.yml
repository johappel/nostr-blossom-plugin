services:
  image-describer:
    build:
      context: ./apps/image-describer
      dockerfile: Dockerfile
    container_name: image-describer
    restart: unless-stopped
    env_file:
      - ./apps/image-describer/.env
    # Optional: override image-gen env vars here (loaded from .env by default)
    # environment:
    #   IMAGE_GEN_API_URL: http://localhost:11434/v1
    #   IMAGE_GEN_API_KEY: ""
    #   IMAGE_GEN_MODEL: black-forest-labs/FLUX.1-schnell
    #   IMAGE_GEN_TIMEOUT_MS: "60000"
    #   IMAGE_GEN_DEFAULT_SIZE: 1024x1024
    ports:
      - '8787:8787'
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s

